name: ClickOnce 배포

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: MSBuild 설정
        uses: microsoft/setup-msbuild@v2

      - name: NuGet 설정
        uses: NuGet/setup-nuget@v2

      - name: NuGet 패키지 복원
        run: nuget restore MifareTool.sln

      - name: 버전 계산
        id: version
        shell: pwsh
        run: |
          $raw = Select-String -Path "Properties\AssemblyInfo.cs" `
                   -Pattern 'AssemblyVersion\("([^"]+)"\)' |
                 ForEach-Object { $_.Matches[0].Groups[1].Value }
          $base = ($raw -split '\.')[0..2] -join '.'
          $ver  = "$base.${{ github.run_number }}"
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "배포 버전: $ver"

      # ── 관리자용 빌드 ────────────────────────────────────────────
      - name: "[Manager] ClickOnce 빌드"
        shell: pwsh
        run: |
          msbuild MifareTool.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DefineConstants="TRACE;MANAGER_MODE" `
            /p:PublishUrl="publish\manager\" `
            /p:InstallUrl="https://TomRyu.github.io/MifareTool/manager/" `
            /p:InstallFrom=Web `
            /p:UpdateEnabled=true `
            /p:UpdateMode=Foreground `
            /p:UpdateInterval=1 `
            /p:UpdateIntervalUnits=Days `
            /p:MapFileExtensions=true `
            /p:ApplicationVersion="${{ steps.version.outputs.APP_VERSION }}" `
            /p:IsWebBootstrapper=true `
            /p:BootstrapperEnabled=true `
            /p:SignManifests=false

      - name: "[Manager] 출력 폴더 이동"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "publish-all\manager"
          Copy-Item -Recurse -Force "bin\Release\app.publish\*" "publish-all\manager\"

      # ── 고객용 빌드 ──────────────────────────────────────────────
      - name: "[Guest] ClickOnce 빌드"
        shell: pwsh
        run: |
          # 이전 빌드 산출물 정리
          Remove-Item -Recurse -Force "bin\Release\app.publish" -ErrorAction SilentlyContinue

          msbuild MifareTool.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DefineConstants="TRACE" `
            /p:ApplicationIcon=cardguest.ico `
            /p:PublishUrl="publish\guest\" `
            /p:InstallUrl="https://TomRyu.github.io/MifareTool/guest/" `
            /p:InstallFrom=Web `
            /p:UpdateEnabled=true `
            /p:UpdateMode=Foreground `
            /p:UpdateInterval=1 `
            /p:UpdateIntervalUnits=Days `
            /p:MapFileExtensions=true `
            /p:ApplicationVersion="${{ steps.version.outputs.APP_VERSION }}" `
            /p:IsWebBootstrapper=true `
            /p:BootstrapperEnabled=true `
            /p:SignManifests=false

      - name: "[Guest] 출력 폴더 이동"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "publish-all\guest"
          Copy-Item -Recurse -Force "bin\Release\app.publish\*" "publish-all\guest\"

      # ── 공통 처리 ─────────────────────────────────────────────────
      - name: "줄바꿈 변환 방지 (.gitattributes)"
        shell: pwsh
        run: |
          $content = "# ClickOnce 배포 파일 - 모두 binary 처리`n* binary`n"
          Set-Content -Path "publish-all\.gitattributes" `
                      -Value $content -Encoding UTF8 -NoNewline

      - name: "배포 폴더 구조 확인"
        shell: pwsh
        run: |
          Get-ChildItem "publish-all" -Recurse | Select-Object FullName

      - name: "GitHub Pages 배포"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: publish-all
          destination_dir: .
          force_orphan: true
          commit_message: "ClickOnce 배포 v${{ steps.version.outputs.APP_VERSION }} (run #${{ github.run_number }})"
