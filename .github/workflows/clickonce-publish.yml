name: ClickOnce 배포

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # SignPath.io OIDC 인증에 필요

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: MSBuild 설정
        uses: microsoft/setup-msbuild@v2

      - name: NuGet 설정
        uses: NuGet/setup-nuget@v2

      - name: NuGet 패키지 복원
        run: nuget restore MifareTool.sln

      - name: 버전 계산
        id: version
        shell: pwsh
        run: |
          $raw = Select-String -Path "Properties\AssemblyInfo.cs" `
                   -Pattern 'AssemblyVersion\("([^"]+)"\)' |
                 ForEach-Object { $_.Matches[0].Groups[1].Value }
          $base = ($raw -split '\.')[0..2] -join '.'
          $ver  = "$base.${{ github.run_number }}"
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "배포 버전: $ver"

      # ── 관리자용 빌드 ────────────────────────────────────────────
      - name: "[Manager] ClickOnce 빌드"
        shell: pwsh
        run: |
          msbuild MifareTool.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DefineConstants="TRACE%3BMANAGER_MODE" `
            /p:AssemblyName=MifareTool `
            /p:ProductName="TheMR관리자" `
            /p:CreateDesktopShortcut=true `
            /p:PublishUrl="publish\manager\" `
            /p:InstallUrl="https://TomRyu.github.io/MifareTool/manager/" `
            /p:InstallFrom=Web `
            /p:UpdateEnabled=true `
            /p:UpdateMode=Foreground `
            /p:UpdateInterval=1 `
            /p:UpdateIntervalUnits=Days `
            /p:MapFileExtensions=true `
            /p:ApplicationVersion="${{ steps.version.outputs.APP_VERSION }}" `
            /p:IsWebBootstrapper=true `
            /p:BootstrapperEnabled=true `
            /p:SignManifests=false

      - name: "[Manager] setup.exe 업로드 (서명 전)"
        uses: actions/upload-artifact@v4
        with:
          name: manager-setup-unsigned
          path: bin\Release\app.publish\setup.exe

      - name: "[Manager] setup.exe SignPath.io 서명"
        uses: SignPath/github-action-submit-signing-request@v1.1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORG_ID }}'
          project-slug: 'MifareTool'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe-signing'
          github-artifact-id: 'manager-setup-unsigned'
          output-artifact-name: 'manager-setup-signed'
          wait-for-completion: true

      - name: "[Manager] 서명된 setup.exe 다운로드"
        uses: actions/download-artifact@v4
        with:
          name: manager-setup-signed
          path: manager-signed

      - name: "[Manager] 서명된 setup.exe 교체"
        shell: pwsh
        run: |
          Copy-Item -Force "manager-signed\setup.exe" "bin\Release\app.publish\setup.exe"

      - name: "[Manager] 출력 폴더 이동"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "publish-all\manager"
          Copy-Item -Recurse -Force "bin\Release\app.publish\*" "publish-all\manager\"

      # ── 고객용 빌드 ──────────────────────────────────────────────
      - name: "[Guest] ClickOnce 빌드"
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "bin\Release\app.publish" -ErrorAction SilentlyContinue

          msbuild MifareTool.csproj `
            /target:Publish `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DefineConstants="TRACE" `
            /p:AssemblyName=MifareTool_Guest `
            /p:ProductName="TheMR고객" `
            /p:CreateDesktopShortcut=true `
            /p:ApplicationIcon=cardguest.ico `
            /p:PublishUrl="publish\guest\" `
            /p:InstallUrl="https://TomRyu.github.io/MifareTool/guest/" `
            /p:InstallFrom=Web `
            /p:UpdateEnabled=true `
            /p:UpdateMode=Foreground `
            /p:UpdateInterval=1 `
            /p:UpdateIntervalUnits=Days `
            /p:MapFileExtensions=true `
            /p:ApplicationVersion="${{ steps.version.outputs.APP_VERSION }}" `
            /p:IsWebBootstrapper=true `
            /p:BootstrapperEnabled=true `
            /p:SignManifests=false

      - name: "[Guest] setup.exe 업로드 (서명 전)"
        uses: actions/upload-artifact@v4
        with:
          name: guest-setup-unsigned
          path: bin\Release\app.publish\setup.exe

      - name: "[Guest] setup.exe SignPath.io 서명"
        uses: SignPath/github-action-submit-signing-request@v1.1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORG_ID }}'
          project-slug: 'MifareTool'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'exe-signing'
          github-artifact-id: 'guest-setup-unsigned'
          output-artifact-name: 'guest-setup-signed'
          wait-for-completion: true

      - name: "[Guest] 서명된 setup.exe 다운로드"
        uses: actions/download-artifact@v4
        with:
          name: guest-setup-signed
          path: guest-signed

      - name: "[Guest] 서명된 setup.exe 교체"
        shell: pwsh
        run: |
          Copy-Item -Force "guest-signed\setup.exe" "bin\Release\app.publish\setup.exe"

      - name: "[Guest] 출력 폴더 이동"
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "publish-all\guest"
          Copy-Item -Recurse -Force "bin\Release\app.publish\*" "publish-all\guest\"

      # ── 공통 처리 ─────────────────────────────────────────────────
      - name: "줄바꿈 변환 방지 (.gitattributes)"
        shell: pwsh
        run: |
          $content = "# ClickOnce 배포 파일 - 모두 binary 처리`n* binary`n"
          Set-Content -Path "publish-all\.gitattributes" `
                      -Value $content -Encoding UTF8 -NoNewline

      - name: "배포 폴더 구조 확인"
        shell: pwsh
        run: |
          Get-ChildItem "publish-all" -Recurse | Select-Object FullName

      - name: "GitHub Pages 배포"
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: TomRyu/MifareTool
          publish_branch: gh-pages
          publish_dir: publish-all
          destination_dir: .
          force_orphan: true
          commit_message: "ClickOnce 배포 v${{ steps.version.outputs.APP_VERSION }} (run #${{ github.run_number }})"
